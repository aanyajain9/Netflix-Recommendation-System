<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Netflix Recommendation System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#141414;
        }

        h1{
            color:#E50914;
            font-weight:bold;
        }

        .card{
            background:#1f1f1f;
            color:white;
        }

    </style>

</head>

<body>

<div class="container mt-5">

<h1 class="text-center">
🎬 Netflix Recommendation System
</h1>

<form method="POST">

<div class="mb-3">

<label class="form-label text-white">
Select Movie
</label>

<select
class="form-select"
name="movie">

{% for movie in movie_list %}

<option value="{{movie}}">
{{movie}}
</option>

{% endfor %}

</select>

</div>

<button
class="btn btn-danger">

Recommend

</button>

</form>

<hr class="text-white">

<div class="row">

{% for movie in recommendations %}

<div class="col-md-4 mt-3">

<div class="card">

<div class="card-body">

<h5>{{movie}}</h5>

</div>

</div>

</div>

{% endfor %}

</div>

</div>

</body>

</html>
