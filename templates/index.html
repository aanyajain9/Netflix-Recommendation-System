<!DOCTYPE html>
<html>
<head>
    <title>Netflix Recommendation System</title>
</head>

<body>

    <h1>Netflix Recommendation System</h1>

    <form method="POST">

        <select name="movie">

            {% for movie in movie_list %}
                <option value="{{ movie }}">
                    {{ movie }}
                </option>
            {% endfor %}

        </select>

        <button type="submit">
            Recommend
        </button>

    </form>

    <h2>Recommendations</h2>

    <ul>

        {% for movie in recommendations %}
            <li>{{ movie }}</li>
        {% endfor %}

    </ul>

</body>
</html>
