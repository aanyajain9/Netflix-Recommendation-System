<!DOCTYPE html>
<html>
<head>
    <title>Netflix Recommendation System</title>

    <style>

        body{
            background-color:#141414;
            color:white;
            font-family:Arial;
            text-align:center;
        }

        h1{
            color:#E50914;
        }

        select{
            width:350px;
            padding:10px;
            margin:10px;
        }

        button{
            background:#E50914;
            color:white;
            border:none;
            padding:10px 20px;
            cursor:pointer;
        }

        .movie-card{
            background:#222;
            width:300px;
            margin:10px auto;
            padding:10px;
            border-radius:10px;
        }

    </style>

</head>

<body>

    <h1>🎬 Netflix Recommendation System</h1>

    <form method="POST">

        <select name="movie">

            {% for movie in movie_list %}
            <option value="{{movie}}">
                {{movie}}
            </option>
            {% endfor %}

        </select>

        <br>

        <button type="submit">
            Recommend
        </button>

    </form>

    <h2>Recommended Movies</h2>

    {% for movie in recommendations %}

        <div class="movie-card">
            {{movie}}
        </div>

    {% endfor %}

</body>
</html>
